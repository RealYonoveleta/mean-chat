services:
  mongo:
    image: mongo:4.4
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: mean-chat
    volumes:
      - mongo_data:/data/db
    networks:
      - chat-net

  backend:
    build:
      context: ./mean-chat-back
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      MONGO_URI: mongodb://mongo:27017/mean-chat
      FRONTEND_URL: http://localhost
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
    ports:
      - "3000:3000"
    depends_on:
      - mongo
    networks:
      - chat-net

  frontend:
    build:
      context: ./mean-chat-front
      args:
        GEOAPIFY_API_KEY: ${GEOAPIFY_API_KEY}
        EMOJI_API_KEY: ${EMOJI_API_KEY}
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - chat-net

volumes:
  mongo_data:

networks:
  chat-net:
